name: Deploy to GitHub pages branch
on:
  push:
    branches: ${{ github.ref_name }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false 
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install deps
        run: |
          npm install
      - name: Lint
        run: |
          npm run lint
          npm run csslint
      - name: Build
        run: |
          node ./scripts/update-last-updated.js
          npm run-script build:esbuild
      - name: Prepare for deploy
        run: |
          rm -rf targetdir/${{ github.ref_name }}/
          mkdir -p targetdir/${{ github.ref_name }}/
          mv dist Pictures translations index.html Synergism.css favicon.ico package.json /targetdir/${{ github.ref_name }}/
      - name: Deploy with the $GME emoji for some reason 🚀
        uses: JamesIves/github-pages-deploy-action@v4.7.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: targetdir/${{ github.ref_name }}/
